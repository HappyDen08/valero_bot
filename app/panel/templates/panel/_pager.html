{% if page.paginator.num_pages > 1 %}
<div class="pager">
  {% if page.has_previous %}<a href="?{% for k, v in request.GET.items %}{% if k != 'page' %}{{ k }}={{ v|urlencode }}&{% endif %}{% endfor %}page={{ page.previous_page_number }}">‹</a>{% endif %}
  <span class="cur">{{ page.number }}</span>
  <span>з {{ page.paginator.num_pages }}</span>
  {% if page.has_next %}<a href="?{% for k, v in request.GET.items %}{% if k != 'page' %}{{ k }}={{ v|urlencode }}&{% endif %}{% endfor %}page={{ page.next_page_number }}">›</a>{% endif %}
</div>
{% endif %}
