services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: ${TZ:-Europe/Kyiv}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    volumes:
      - ./media:/app/media
    ports:
      # назовні веб відкритий лише локально; зовнішній доступ — через caddy (https)
      - "127.0.0.1:8088:8000"
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["prod"]  # стартує лише на сервері: make up-prod
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
    depends_on:
      - web

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    command: python manage.py runbot
    volumes:
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: ${TZ:-Europe/Kyiv}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./media:/media:ro
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: >
      sh -c "echo '0 3 * * * /backup.sh >> /backups/backup.log 2>&1' > /etc/crontabs/root &&
             crond -f -l 8"
    depends_on:
      db:
        condition: service_healthy
